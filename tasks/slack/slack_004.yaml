id: slack_004
toolkit: slack
difficulty: medium
prompt: "Get the last 10 messages from the #general channel. What topics are being discussed?"
expected_tools:
  - SLACK_FETCH_CONVERSATION_HISTORY
min_tool_calls: 1
max_tool_calls: 3
success_rubric: |
  The response should list or summarize recent messages from #general (or the equivalent
  main channel). It should characterize the topics discussed. If the channel has fewer than
  10 messages, summarizing all available messages is acceptable.
