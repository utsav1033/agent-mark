id: slack_003
toolkit: slack
difficulty: medium
prompt: "Search Slack for messages about 'deployment' or 'deploy'. Summarize the most recent 3 results."
expected_tools:
  - SLACK_SEARCH_MESSAGES
min_tool_calls: 1
max_tool_calls: 3
success_rubric: |
  The response should summarize at least 2-3 Slack messages mentioning deployment or deploy,
  including the channel or sender context. If no results are found, the agent should say so.
  The agent must not fabricate message content.
