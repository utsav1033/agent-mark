id: linear_003
toolkit: linear
difficulty: medium
prompt: "Find all Linear issues that are currently 'In Progress'. List their titles and assignees."
expected_tools:
  - LINEAR_LIST_ISSUES
min_tool_calls: 1
max_tool_calls: 3
success_rubric: |
  The response should list issues in the 'In Progress' state (or equivalent) with their
  titles. If no issues are in progress, the agent should state this explicitly. The agent
  must not fabricate issue data.
