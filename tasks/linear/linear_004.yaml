id: linear_004
toolkit: linear
difficulty: medium
prompt: "Find the highest priority open issues in Linear (Urgent or High priority). List the top 5."
expected_tools:
  - LINEAR_LIST_ISSUES
min_tool_calls: 1
max_tool_calls: 3
success_rubric: |
  The response should list open issues with Urgent or High priority, including their titles.
  If no high-priority issues exist, the agent should clearly say so. Priority labels must
  reflect actual data, not guesses.
