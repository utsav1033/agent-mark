id: linear_005
toolkit: linear
difficulty: hard
prompt: >
  I want to understand the current sprint health. List all issues that are:
  1. In the current cycle/sprint (if cycles exist), OR
  2. Due within the next 7 days.
  For each, show the title, assignee, and status. Summarize how many are blocked or at risk.
expected_tools:
  - LINEAR_LIST_ISSUES
  - LINEAR_GET_ISSUE
min_tool_calls: 1
max_tool_calls: 6
success_rubric: |
  The response should either list issues from the current sprint/cycle with their status and
  assignees, or explain that no cycle information is available and fall back to due-date
  filtering. A summary of blocked/at-risk items is required for full success. The agent
  should not fabricate issue data.
